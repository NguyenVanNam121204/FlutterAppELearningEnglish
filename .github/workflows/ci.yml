name: 🔄 Flutter CI

# ───────────────────────────────────────────────────────────────────
# Chạy tự động khi:
#   - Push code lên nhánh main hoặc develop
#   - Mở / cập nhật Pull Request vào main hoặc develop
#
# CHỈ chạy khi có thay đổi trong thư mục front_elearning_flutter/
# → Không chạy khi chỉ commit Backend hoặc file khác ngoài Flutter
# ───────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, develop ]
    paths:
      - 'front_elearning_flutter/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'front_elearning_flutter/**'
      - '.github/workflows/**'

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Kiểm tra chất lượng code
  # ─────────────────────────────────────────────────────────────────
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        working-directory: front_elearning_flutter
        run: flutter pub get

      - name: 📝 Create mock .env file for analysis
        working-directory: front_elearning_flutter
        run: touch .env

      - name: 🔍 Dart Analyze (static analysis)
        working-directory: front_elearning_flutter
        run: flutter analyze --no-pub

      - name: 🎨 Format Check
        working-directory: front_elearning_flutter
        run: dart format --output=none --set-exit-if-changed .

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Chạy Unit Tests
  # ─────────────────────────────────────────────────────────────────
  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: 📝 Create .env file (dùng giá trị mock cho test)
        working-directory: front_elearning_flutter
        run: |
          cat > .env << EOF
          API_BASE_URL=http://localhost:5030/api
          APP_ENV=test
          ENABLE_NETWORK_LOG=false
          CONNECT_TIMEOUT_MS=15000
          RECEIVE_TIMEOUT_MS=15000
          EOF

      - name: 📦 Install dependencies
        working-directory: front_elearning_flutter
        run: flutter pub get

      - name: 🧪 Run Unit Tests
        working-directory: front_elearning_flutter
        run: flutter test test/ --reporter expanded

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Kiểm tra build (không ký, không upload)
  # ─────────────────────────────────────────────────────────────────
  build-check:
    name: 🔨 Build Check (Android Debug)
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: 📝 Create .env file
        working-directory: front_elearning_flutter
        run: |
          cat > .env << EOF
          API_BASE_URL=http://localhost:5030/api
          APP_ENV=dev
          ENABLE_NETWORK_LOG=true
          CONNECT_TIMEOUT_MS=15000
          RECEIVE_TIMEOUT_MS=15000
          EOF

      - name: 📦 Install dependencies
        working-directory: front_elearning_flutter
        run: flutter pub get

      - name: 🔨 Build Debug APK (kiểm tra biên dịch)
        working-directory: front_elearning_flutter
        run: flutter build apk --debug

      - name: ✅ Build success
        run: echo "Build completed successfully — code is ready to merge!"
